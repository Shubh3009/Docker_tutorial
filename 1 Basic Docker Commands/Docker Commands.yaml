########################################
########## Basic   Docker  Commands ####
########################################

############################
##### docker pull ##########
############################

$ docker pull ubuntu 
# The pull command just downloads the image,  use this command if you want to download an image without running the image



############################
##### docker images ########
############################

# We can list the available images on the local host using docker images
$ docker images 

# lets go ahead and create the first container without starting it



###########################
##### docker ps ###########
###########################

$ docker ps
# This commands lists all the running containers. 
# in our case, you should not see any containers since none is running as of now


# docker ps >>>> list all container running 
# after the container finish the process the container dead so it move to ps -a
# docker ps -a >>> list all container that stoped

$ docker ps -a     ## or --all
# This should show the command we just created




############################
##### docker create ########
############################

#let's create an nginx container with the name cont1

$ docker create --name cont1 nginx
# To verify that the container is created, we can use docker ps -a command







############################
##### docker start #########
############################

# Now lets go ahead and start the container we just created

$ docker start cont1  # starts the container 



### Open another terminal to the AWS Ubuntu EC2 instance 


# Verify the container is running
$ docker ps

# We should see the container now


####################################################################
########## Verify that a container is a Software Process ###########
####################################################################

$ ps aux

$ ps a | grep cont1






#############################
##### docker stop ###########
#############################

# Lets now stop the previously created container

$ docker stop cont1

# Verify by running docker ps -a 

$ docker ps
# You should not see any containers

$ docker ps -a
# This will show the container stopped

# Lets now see if the container process still exists
$ ps aux | grep cont1
## It should be deleted

#####################################################################
###### Interacting with a container using the -i and -t options #####
#####################################################################


#############################
##### docker exec ###########
#############################

# Create and start a python container with the name cont2
$ docker create --name cont2 nginx

$ docker start cont2


# Excute a command
$ docker exec cont2 cat /etc/hosts

$ docker exec -t cont2 cat /etc/hosts
# do you see a difference in the output between this command and the previous one when you added the -t option? why?
# Because a seudo tty is now open, so the output is more organized


# Interact with the container (send input to the container)
$ docker exec cont2 login
# This should start the login process within the container, it should promt you for login username and password. However, how can we send the input in?
# and how can we see the output?

# Lets try
$ docker exec -t cont2 login
# Now you get the output which is the login: prompt for the username, but stdin is not available to type and get responses, try type ubuntu, you should get a password prompt; however, you will not get it, why?


# To fix the input issue, we can use the -i option

$ $ docker exec -i cont2 login
# You can send information into the container; however, now you have lost the -t which means stdout will not be directed to you.

# So how can we do both?
# Open an Interactive shell within the container (from the container prompt)
$ docker exec -it cont2 login

# notice the change of the prompt, you are now logged into the container
# The container is an nginx one, so you can run some linux commands like ps

$ ps
# Please note that this is treating the container as a linux machine that you are logged into and using linux commands

$ exit 
# To exit and stop the container

$ docker ps
# validate the container state.






################################
######## docker run  ###########
################################

# Lets now create an ubuntu container with the name 2ndcontainer in detached mode using docker run. 

$ docker run -d --name container-run1 ubuntu
# verify using docker ps. You should see the container in the list.

# Lets now create a python container (from the image python) with the name pythoncontainer in interactive bash shell using the -it options.

$ docker run -it --name container-run2 python /bin/bash

# Please notice the promot change.
# now since we are logged into the container, lets execute some commands

$ apt update
$ apt upgrade
$ ps # list running processes *** PID *** 
$ python3 # it will open the python interactive mode
1+1 # A summation execise to add 1 and 1, it will print the result 2
print("Hello Docker!") # this will print Hello Docker! on the screen

exit() # exit from the python interactie mode

exit # exit from the container, this will cause the container to exit


## Using the --rm option

docker run -it --rm --name container-run2 python /bin/bash




