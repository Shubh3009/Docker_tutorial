##################################################################
####### Inbound Access from the Internet to the container ########
##################################################################

##################################################
###### Container Port Mapping (Port Binding)######
##################################################


# Create an Nginx container, name is cont1, interactive mode
$ docker run -it --name cont1 nginx /bin/bash

# Nginx by default listens on port HTTP (80)


# Now, we need to test access to the nginx container from the internet (from your laptop)
# Log on to the AWS console, in the EC2 dashboard, select the Docker Server instance by ticking the box to the left of the docker server name. 
# The details page will open. search for an copy the public IP IPv4 address of the EC2 instance.

# Port HTTP (80) is the default http port which Nginx listens on.
# To verify this, 

# From within the container cont1 shell run the command
$ cat /etc/nginx/conf.d/default.conf | grep listen

# Look for the line 
# Listen 80,
# or cat the file and look for

# server {
#     listen       80;
#     server_name  localhost;

# Open a new web browser tab and type


# Let's now start nginx using the command nginx from within the container
$ nginx

# Let's test from your laptop browser to the container on port 80 using the Docker host's (EC2 instance), public IPv4 address

http://<Docker Server public IP>:80 
# This should initiate an HTTP request on port 80 to the docker server host
# press enter. Did the page show the default Nginx server? Why not?
# This is because by default, there is no port binding between the running nginx container port and the host ports.

# Try to access the container from within the local host using the Docker host's private IPv4 address (you can get it from the EC2 dashboard) on port 80

$ curl http://<Docker Host Private IPv4 address>:80
# This will also fail and you will get an error

# Since we cannot do the port binding after creating the container.
# We need to create a new Nginx container, cont5, Nginx Image, and create it in interactive and detached mode with port 80 mapped to docker host port 3000 using the -p 3000:80 option

$ docker run -d -p 3000:80 --name cont2 nginx

# Now, open a new web browser tab and navigate again to the public IP of the docker server on port 3000

http://<Docker Server public IP>:3000 
# You should see the default Nginx welcome page now.

# Try to access the container from within the local host using the Docker host's private IPv4 address (you can get it from the EC2 dashboard) on port 80

$ curl http://<Docker Host Private IPv4 address>:80
# This will also succeed now given that port binding is already configured

# You can check the port mapping using the command

$ docker port cont2
# You should something similar to :
# 80/tcp -> 0.0.0.0:3000
# 80/tcp -> [::]:3000


# Also run docker ps and look under the PORTS
$ docker ps


# CONTAINER ID  IMAGE    COMMAND                     PORTS                        
# f0a07a80f443  nginx   "/docker-entrypoin"  0.0.0.0:3000->80/tcp, [::]:3000->80/tcp



# Remove the containers
$ docker rm -f cont1 cont2


