docker inspect ubuntu | grep Size






##########################
##### docker commit ######
##########################

# Create a container with the name container-commit from the image Ububtu with interactive bash terminal and log on to it
$ docker run -it -d --name container-commit ubuntu 
# we can also do -itd instead of separate -it and -d

# Now, log into the container
$ docker exec -it container-commit bash

## Please note, we could have combined the last two commands using the following command
$ docker run -it --name container-commit ubuntu /bin/bash


# Now, please verify that the prompt is now the container prompt and not the AWS EC2 Ubuntu virtual machine


# 1) Try to run "ping 8.8.8.8", 
# 2) try to nano a file "nano file1.txt"
# 3) try to find the IP address info using "ip a"
# 4) try to curl https://www.cnn.com

# use the linux "which" command to see if the tools (Commands) are available and at which path (full path on the linux system) if available. No response means it does not exit
$ which touch
$ which ls
$ which mkdir
$ which ping
$ which curl
$ which nano
$ which ip 

# If the above utilities are not available in the Ubuntu image, then it is very useful to install them in your container. Then create an image from this container and use it for your future testing or similar activities.

# use the below command to install ping, curl, nano, and ip address features

$ apt-get update 
$ apt-get install -y iputils-ping curl 
$ apt-get install -y iproute2
$ apt-get install -y nano 


# repeat the above test steps again

# 1) Try to run "ping 8.8.8.8", 
# 2) try to nano a file "nano file1.txt"
# 3) try to find the IP address info using "ip a"
# 4) try to curl https://www.cnn.com

# Are the utilities successfully installed? or are you still getting errors?
# They should be installed and working now



# Create a new docker image with the name new-image from the created container

$ docker commit container-commit new-image

# Verify that the new container exists. Check its size.
$ docker images 

# Lets create a new container with the name testing-cont from the new-image. we will also log in to the container in the same step

$ docker run -it  --name testing-cont new-image /bin/bash

# Now, in the new container, run the previous steps again and see if the tools are readily available
# repeat the above test steps again
# 1) Try to run "ping 8.8.8.8", 
# 2) try to open a file using "vim file.txt", 
# 3) try to nano a file "nano file1.txt", 
# 4) try to find the IP address info using "ip a"
# 5) try to curl https://www.cnn.com

# Are the utilities available right off the bat in the new container?
# They should be already installed and working 



## During the docker commit, you can also add the container metada and add a commit message as an example

$ docker commit -a "John Doe <john.doe@example.com>" -m "Updated web server configuration" container-commit new-image-1


# verify using docker images
$ docker images

# Use docker inspect to find out if the meta data is added to the new image

$ docker inspect new-image-1






###############################
########### docker rm #########
###############################

# rm = Remove/delete container(s)
# List the available containers, running and stopped
$ docker ps -a

# Select a container to remove (you can use container name or ID)
$ docker rm <container_ID or container_name>

# Check if the container has been deleted
$ docker ps -a

# You can also do the same by entering the first 3 letters from the container ID
$ docker rm <first 3 characters of the image ID>  

# You can use the command to remove/delete multiple containers at once 
$ docker rm ID1 ID2 ID3 ...

# verify the deletion using ps -a

# choose a running container and try the docker rm, you should get an error. (create a new container if non is running then try the docker rm)

# To delete the container using docker rm, you can stop it then delete it. or you can use the -f flag as shown below.

$ docker rm -f <container_ID> 
# The command with -f should stop the running container and delete it. Verify using the docker ps -a command






###############################
########## docker rmi #########
###############################

# rmi = Remove/Delete docker image(s)

# Lets list the existing docker images on the local host
$ docker images # list images 

# Ensure that the python container is stopped if it was still running.

$ docker rmi python  # Select an image to delete - Python for example
# This should delete the python image, verify by running docker images 

$ docker images

# Lets create an nginx container - this will download nginx image even if it did not exist on the local host

$ docker run --name container-rmi1 nginx

# Now we have a running container, lets try and delete the image nginx which container-rmi1 is created from

$ docker rmi nginx 
# This command will fail with an error. This is because there is a running conatiner created from this image.
# We need to stop the depedent conatiner(s) first and then try to delete the image

# If we need to force delete the imag while the containers are runninge, we can use the -force or -f option
# This will stop the dependent containers and they will become disconnected from the image and cannot be restarted. The file systems and data inside the containers will be as is; however, we will not be able to restart them again.

$ docker rmi -f nginx
# This should work now

# Run the command docker ps -a to verify the status of the depedent containers. Were they stopped? can you re-start them with docker start?







