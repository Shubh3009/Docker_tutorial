######### docker logs  ########
###############################

# Lets run a container that will have a shell of type sh, and excute a loop that prints the date and time every 2 seconds

$ docker run -itd --name cont-logs alpine sh -c 'while true; do date; sleep 2; done'

# This script is equivalent to
# while true; do
#     date        # prints the current date and time
#     sleep 2     # waits for 2 seconds
# done

# Lets now print the logs

$ docker logs -f cont-logs # This will print the logs live ""-f"" is for follow

$ docker logs cont-logs # This will print the available logs then exits






