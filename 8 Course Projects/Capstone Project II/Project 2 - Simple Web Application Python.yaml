# Create the docker compose file

$ nano docker-compose.yml
# It will build an image of the app and use a readily available image for redis #######


services:
  web:
    build: .
    ports:
      - "9000:5000"
    env_file:         # Tells Docker Compose what is the variables file
      - .env
    volumes:          # Maps the visitor-counter directory on the host to /app
      - .:/app
    depends_on:       # Influences creating redis container first before web
      - redis

  redis:
    image: redis:alpine
    volumes:
      - redis-data:/data # Maps a named volume to the /data directory in redis

volumes:
  redis-data:

