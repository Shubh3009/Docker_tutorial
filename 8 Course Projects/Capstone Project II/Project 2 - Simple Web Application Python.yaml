# Expose the port the app runs on 
EXPOSE 5000

# Command to run the application
CMD ["flask", "run"]

#### Notes:
# the --no-cache-dir in pip install
# 🔍 What It Does
# It prevents pip from storing downloaded package files in its local cache (~/.cache/pip). 
# Specifically:
# Saves space in the Docker image.
# Avoids storing .whl and .tar.gz files after installation.
# Makes the final image smaller and cleaner, especially useful in Docker builds.


# The ENV FLASK_RUN_HOST=0.0.0.0
# This sets an environment variable that tells Flask's development server to:
# 🔊 Listen on all available network interfaces, not just localhost (127.0.0.1).
# 🧠 Why It Matters in Docker
# By default, Flask runs on 127.0.0.1, which means:
# It's only accessible inside the container
# You cannot reach it from your browser on localhost:5000
# ➡️ In other words, when you use the ENV FLASK_RUN_HOST=0.0.0.0, Flask becomes accessible from outside the container, through the published port

# We can also include the same by using 
# CMD ["flask", "run", "--host=0.0.0.0"]
# But the ENV option is preferred.

# We can combine the Host and port as follows in the CMD command
# CMD ["flask", "run", "--host=0.0.0.0", "--port=5000"]

# Again, the ENV option is easier to override at runtime and is cleaner in terms of code quality.




