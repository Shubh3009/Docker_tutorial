# Change the app.py file on the Docker host as follows:
# Change "Hello From DolfinED, I have been seen..." to the following statement  "Hello From DolfinED's Docker Mastery Course, I have been seen... " and then save the file

### Reload the browser page, you will see the change. This makes sense, since the change is made to the Docker Host app.py under the visitor-counter directory which is mapped to the /app directory in the web container.

# This is crucial in development mode as we need to do changes that reflect automatically to the running containers.

# Let's analyze what played a role in this automatic updates to the container.
# Inspecting the docker-compose file we can see the .:/app under volumes. This is how we mapped visitor-count to /app in the web container.

# Moreover, the FLASK_ENV=development enables auto-reload (live code changes) and the debug mode which both help in automatically refreshing the app and reflecting any changes in the app.py

# We can also include 
      # FLASK_DEBUG=1
      # In the .env (or docker compose YAML file under environment: attribute) which will enable the debugger. Not required since FLASK_ENV=development takes care of that and the auto loader.
---
    volumes:
      - .:/app  # binds the host "project" directory to the container's /app 
    environment:
      - FLASK_ENV=development   # informs Flask that this is development
      - FLASK_DEBUG=1           # enables the debugger
---


