###########################################################
################### Demo Docker Bind Mounting  ############
###########################################################

Objective:
1- Create a new host directory
2- run a container with this host directory as a volume
3- run a second container with the same volume 
4- Access the file in the volume from the two containers
5- Read-only Option
6- Using a container as a shared data volume



-v [host directory]:[container directory]

# Login to the EC2 docker host  

# change to root using "sudo su"
$ sudo su

# check the working directory using pwd
$ pwd
# shoudl be /home/ubuntu

# Create a new directory, host-folder on the EC2 host file system 
$ mkdir host-folder 

# Take a note of the full path to the host-folder directory by typing pwd
$ pwd
# should be home/ubuntu/host-folder

# Move into the new directory
$ cd /host-folder

# Create a host.txt with a sentence "Hello from Host" using echo command
$ echo "Hello from host-folder, message 1" >> host.txt

# Verify that this file is created
$ ls

# Go back to the home direcoty
$ cd ..


# Lets now create an ubuntu container, cont1, with the created host directory as a bind mount. Map that directory to the directory /cont-folder on the container

$ docker run -it --name cont1 -v /home/ubuntu/host-folder:/cont-folder ubuntu bash
# Please note, the full path to the host directory must be written.
# The full path of the host-folder can simply be obtained by running "pwd" inside the host-folder directory. You need to add the in full to the -v option above.

# From a second session into the EC2 docker host, Inspect the volume to find the mount path, 

$ docker inspect cont1

# it should look similar to the below output:

# "Mounts": [
#             {
#                 "Type": "bind",
#                 "Source": "/home/ubuntu/host-folder",
#                 "Destination": "/cont-folder",
#                 "Mode": "",
#                 "RW": true,
#                 "Propagation": "rprivate"
# Also
#  "HostConfig": {
#             "Binds": [
#                 "/home/ubuntu/host-folder:/cont-folder"
#             ],


# We need to verify that it actually works. To do that, let's move back to the container prompt


# Verify that the /cont-folder directory exists.
$ ls
# you should see the /cont-folder directory

# change directory into the /cont-folder path
cd /cont-folder

# browse the files in the directory
$ ls
# you should see the file "host.txt" we created earlier in the host.

# Verify the content of the file
$ cat host.txt

# you should see the sentence "Hello from host-folder, message 1"

# This proves that mapping the bind mount into the container /cont-folder path allows the container to see everything in that directory.

######## Lets now see what happens when we change the file host.txt in the EC2 docker host while the container cont1 is running.#####

# Switch to the EC2 docker host terminal 

# Now you are on the host while the container cont1 is running.

# Change directory to the /host-folder directory in the host
cd /host-folder

# Change the data in the host.txt using the echo command
$ echo "This is a second message from the Host" >> host.txt
# please note there are two ">" signs not one, this is important to append the message to the file and not overwrite its content

# Verify the change has taken place
cat host.txt

# Now, switch back to the previous EC2 docker host terminal, which was open to the container shell

# in the container shell, use the "cat" command to check the content of the host.txt file
cat host.txt

# You should see the two messages in the .txt file
# Hello from host-folder, message 1
# this is the second message from host

# This is why bind mount is preferred over docker volumes for development and testing where you can do changes on the host and the containers in question will get the changes spontaneously.


############################################################
#################### Read only Bind Mounts #################

# Create another container cont2 and use bind mount for the same host directory we used earlier
$ docker run -it  --name cont2 -v /host-folder:/cont-folder:ro ubuntu bash

# From the docker host termial, let's inspect cont2
$ docker inspect cont2
# Look for the mounts section, it should look something like this

#  "Mounts": [
#             {
#                 "Type": "bind",
#                 "Source": "/home/ubuntu/host-folder",
#                 "Destination": "/cont-folder",
#                 "Mode": "ro",
#                 "RW": false,
#                 "Propagation": "rprivate"

# Notice that the RW is false because of the :ro or read-only option used


# Let's check the cont-folder inside the second container

$ cd /cont-folder 
$ ls
$ cat host.txt
# You should see the same content as we did with cont1

# Try to create a directory abc
$ mkdir abc
# What did you get?
# Did you see a message like the following : 
mkdir: cannot create directory '23': Read-only file system

# This proves that the read only :ro option works. 

# Lets now head to the EC2 docker host terminal again, and make a new change into the host.txt file
$ cd host-folder 

# Add this message into the file host.txt 
$ echo "this is the third message from host" >> host.txt

# Verify that a new line with this message has been added
$ cat host.txt

# Now head back to the cont2 bash terminal that is open

# Check the content of the host.txt that the container can access through the cont-folder

$ cat host.txt

# you should see something similar to this
# root@09befa060019:/cont-folder# cat host.txt
# Hello from host-folder, message 1
# this is the second message from host
# this is the 3rd message from host

## this explains how we can change the content of the host path and that reflects immediately into the container.
# In named docker volumes, if we need to change something in the volume, we need to create a container with the volume mounted, do the changes through the container. However, named docker volumes are preferred for production.

# You can go ahead and clean up the containers and volume on the host.


