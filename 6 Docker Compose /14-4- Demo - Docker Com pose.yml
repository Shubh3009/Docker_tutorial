
####################################################################
############# Single Container  Docker Compose File ################


# Create A docker compose configuration file
# Define a web tier container from Nginx image that will will have a host port mapping of 8000:80, the container name is dolfined

 
# in VS Code, create the compose configuration file below
# Services refer to containers

services:
  web:
    image: nginx
    container_name: dolfined
    ports:
      - "8080:80"
---

# Copy this content from VS Code and lets create a docker-compose.yml in the Docker host. Use vim or nano for that.

$ nano docker-compose.yml
# Paste the VS code above and save the file


# Lets start the container using docker compose in detached mode
$ docker compose up -d
# As you can see it has started a new bridge network "ubuntu_default" to which the container will be attached.

# To verify, use
$ docker network ls
# you will find the ubuntu-default bridge network created by docker compose

# Verify the container is created using the command
$ docker ps

# From the aws console, copy the public IPv4 address of the docker host. Open a new browser and start an http session to that IP address on port 8080

http"//<EC2 Docker host IPv4 address>:8080
# You should be able to see the default Nginx page


# You can stop the docker compose container using the command
$ docker compose stop

# When needed, you can start the docker compose container again using the command
$ docker compose start


##### Lets now check the network that was created by docker compose
$ docker network ls
# You should be able to see the ubuntu_default network which was created by docker compose.

# Lets inspect this network
$ docker network inspect ububtu_default


# Lets now verify that the container is attached to the network
$ docker inspect dolfined
# Check the network attachment for the container, it should be network ubuntu

# You can delete the docker compose container using the command, 
$ docker compose down
# This will remove the container(s) and the Ubuntu_default bridge network that was created by docker copose.




####################################################################
############# Multiple Containers Docker Compose File ##############

# Create a second docker compose configuration file to create a second nginx container 
# It is easier to write this in VS Code then we can copy paste into the file in the Docker host

$ nano docker-compose.yml
---
services:
  web:
    image: nginx
    container_name: dolfined
    ports:
      - "8080:80"
  frontend:
    image: nginx
    container_name: dolfined2
    ports:
      - "4000:80"
---
# Save the file


# Start the docker compose containers
$ docker compose up -d

# List the running containers
$ docker ps

# If you want to check the docker compose containers only, you can use the command
$ docker compose ps

# From the aws console, copy the public IPv4 address of the docker host. Open a new browser and start an http session to that IP address on port 8080

# Access the dolfined container
http"//<EC2 Docker host IPv4 address>:8080

#and the dolfined2 container
http"//<EC2 Docker host IPv4 address>:4000

# You should be able to see the default Nginx page from both containers


# Delete both containers and the network created by docker compose
$ docker compose down 




################################################################
########### Docker Compose file - Adding  volumes ##############

# We will add a bind mount to the first container configuration, and a docker volume to the second container

# On the docker host, let's create a directory host-folder which will be used for the bind mount
$ mkdir host-folder

# Change the path into the host-folder
$ cd host-folder/

# Find out the full path of this directory
$ pwd
/home/ubuntu/host-folder
# Take a note of the command output in your case if it is different, it has to be the full output of the "pwd" command

# Lets now write the volumes in VS Code (as per the below), then copy and paste into the docker-compose.yml file then save it

# go back to the home directory
$ cd ..
$ pwd
# /home/ubuntu

$ nano docker-compose.yml
---
services:
  web:
    image: nginx
    container_name: cont1
    ports:
      - "8080:80"
    volumes:
      - /home/ubuntu/host-folder:/usr/share/nginx/html
# This adds a bind mount for the first container map it to the /usr/share/nginx/html directory in the container

# The /usr/share/nginx/html directory in Nginx is the default root document where Nginx stores the server static files (HTML, CSS, JS, Images...etc)

  frontend:
    image: nginx
    container_name: cont2
    ports:
      - "4000:80"
    volumes:
      - new-vol:/usr/share/nginx/html
# This adds the named docker volume new-vol and map it to the /usr/share/nginx/html directory in the container


volumes:
  new-vol: 
# This will create the named docker volume new-vol used in the second container

---

# Now copy the above and paste it in the docker-compose.yml file and save it

# Before we go ahead and start the containers, let's check that there are no docker volumes available on the host.

$ docker volume ls

# You will not find any (unless if you did not clean up from previous labs)
# If you find any and you do not want them, it is a good idea to clean them up now.

# Lets start the containers through docker compose
$ docker compose up -d

# Lets see what containers have been created
$ docker compose ps

# Now, list the available volumes again
$ docker volume ls
# You should see an output like the below
DRIVER    VOLUME NAME
local     ubuntu_new-vol

# Lets inspect both containers to check the Mounts section 

$ docker inspect cont1
# You should see the "Type" as bind mount


$ docker inspect cont2
# You should see the "Type" as volume mount


# Lets now create a simple index.html page in the host-folder on the docker host. because of the bind mount, this should be on the /use/share/nginx/html directory in the container, dolfined. 
# This will not affect the other container, dolfined2, because it relies on a docker volume and it is not related to the /host-folder/ directory.

$ cd host-folder

# Check the contents of this folder
$ ls
# There shouldn't be any files in the folder

~/host-folder$ nano index.html   


