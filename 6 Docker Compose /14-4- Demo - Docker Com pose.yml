###########################################################################
########## Using the Image Build Feature in Docker Compose ################


# Now, Create the below Dockerfile and save it.

$ nano Dockerfile
---
FROM nginx
EXPOSE 80
---

# Next, Lets create a docker compose file with a custom name and add the below content to it and save it.

$ nano alternatename.yml
---
services:

  web:
    build: .  # build from the current directory using a file named Dockerfile
    container_name: dolfined
    ports:
      - "8080:80"
---
# save the file and exit

# Start the docker compose container dolfined using the -f and specify the alternate file name

$ docker compose -f alternatename.yml up -d

# Verify that the image was built by docker compose. This image will be used to create the container dolfined.

$ docker images
# You should find an image ubuntu_web created 

# Verify that the container is created
$ docker compose ps

# Lets delete the resourses created
$ docker compose down -f alternatename.yml --remove-orphans --volume

# Remove the image created by docker compose
$ docker rmi ubuntu-web



##########################################################################
####### Dockerfile with an alternate name in a different directory #######

# Lets now investigate how we can use the docker compose build feature when using a dockerfile with a different name and in another directory, other than the local directory

# Lets create a new directory new-dir
$ mkdir new-dir

# Lets move and rename the current Dockerfile from the current directory into /new-dir and change its name to alternatefile
$ mv Dockerfile new-dir/alternatefile

# Lets create a new  Docker compose file to update these changes

$ nano alternatename.yml
---
services:

  web:
    build:
      context: ./new-dir # shows the relative path to the docker file location
      dockerfile: alternatefile # The name of the docker file in /new-dir
    container_name: dolfined
    ports:
      - "8080:80"
---

# Save the file to alternatename.yml (not docker-compose.yml) and lets try this configuration file

$ docker compose -f alternatename.yml up -d
# You will find that it works without any issues. Also, the ubuntu-web image was created. 

# Lets clean up. We can use the --rmi all option to clean up any images docker compose built or downloaded (not good for production environments - use with care)
$ docker compose down  -f alternatename.yml --rmi all

# Please remember that Docker compose is for multi-container configurations on a single docker host. If you want to manage docker containers on multiple hosts, Docker Swarm is one tool to help you with that. Alternatives are kubernetes or OpenShift

