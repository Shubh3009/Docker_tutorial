#####################################################
############### Demo installing docker ##############
#####################################################
The installation steps are found here 
https://docs.docker.com/engine/install/ubuntu/
######################################################



# Update the existing packages on the Ubuntu EC2 Instance:
sudo apt-get update

# Install prerequisite packages which allows apt utilize HTTPS:
sudo apt-get install ca-certificates curl
sudo install -m 0755 -d /etc/apt/keyrings

# Add GPG key for the official Docker repo to the Ubuntu system:
sudo curl -fsSL https://download.docker.com/linux/ubuntu/gpg -o /etc/apt/keyrings/docker.asc
sudo chmod a+r /etc/apt/keyrings/docker.asc

# Add the repository to Apt sources:
echo \
  "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] https://download.docker.com/linux/ubuntu \
  $(. /etc/os-release && echo "${UBUNTU_CODENAME:-$VERSION_CODENAME}") stable" | \
  sudo tee /etc/apt/sources.list.d/docker.list > /dev/null


# Update the  database with the Docker packages from the added repo:
sudo apt-get update


# Install the Docker packages
 sudo apt-get install docker-ce docker-ce-cli containerd.io docker-buildx-plugin docker-compose-plugin


# Docker should now be installed, the daemon started, and the process enabled to start on boot. To verify
sudo systemctl status docker

# if not started, use the command
sudo systemctl start docker

# Then validate using
sudo systemctl status docker

# To ensure docker starts automatically after each reboot or restart of the EC2 Ubunto instance
sudo systemctl enable docker


# Now, run your first container to verify proper installation
sudo docker run hello-world


# To avoid using sudo with every command, we can do one of two things:

# 1) run as root using the command
sudo su

# or
# 2) add the current user to the Docker grou. To do this check Groups the cusrrent user is a member of:
whoami

# This command will show you the current user you are using on Ubuntu

# Check the groups this user is a member of
groups

# You will see that the user is not part of the Docker group

# Add the user to the docker Group:
sudo usermod -aG docker ${USER}
sudo usermod -aG docker ssm-user


# Reboot the EC2 instance (docker host) for this change to take effect

# After restarting check groups again
groups

# The user should now be added to docker group


# To validate, run the commands without the sudo word
docker version # and see the containerd runC
docker info
docker -v